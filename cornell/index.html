<style data-name="康奈尔笔记布局（不依赖 sy-plugin-enhance）">
/* 康奈尔笔记模板：匹配 sy-plugin-enhance 导出的 custom-iscornell 超级块，不依赖插件 */
.protyle-wysiwyg [custom-iscornell="true"],
.b3-typography [custom-iscornell="true"] {
  --cornell-gap: 14px;
  --cornell-padding: 18px;
  --cornell-clue-bg: #d9d5ff;
  --cornell-clue-title: #5b63d6;
  --cornell-note-bg: #f7e8da;
  --cornell-note-title: #ff7a2f;
  --cornell-summary-bg: #ffd9de;
  --cornell-summary-title: #ff4d57;
  --cornell-text: var(--b3-theme-on-background);
  display: block;
  box-sizing: border-box;
}
.protyle-wysiwyg [custom-iscornell="true"] > [data-type="NodeSuperBlock"],
.b3-typography [custom-iscornell="true"] > [data-type="NodeSuperBlock"] {
  margin: 0 !important;
}
.protyle-wysiwyg [custom-iscornell="true"] > [data-type="NodeSuperBlock"]:first-child,
.b3-typography [custom-iscornell="true"] > [data-type="NodeSuperBlock"]:first-child {
  gap: var(--cornell-gap);
}
.protyle-wysiwyg [custom-iscornell="true"] > [data-type="NodeSuperBlock"]:first-child [data-type="NodeSuperBlock"]:first-child,
.b3-typography [custom-iscornell="true"] > [data-type="NodeSuperBlock"]:first-child [data-type="NodeSuperBlock"]:first-child {
  flex: 0 0 33%;
  width: 33%;
  min-height: 110px;
  box-sizing: border-box;
  margin: 0 var(--cornell-gap) var(--cornell-gap) 0 !important;
  padding: var(--cornell-padding) !important;
  border-radius: 0 !important;
  background: var(--cornell-clue-bg) !important;
  color: var(--cornell-text);
}
.protyle-wysiwyg [custom-iscornell="true"] > [data-type="NodeSuperBlock"]:first-child [data-type="NodeSuperBlock"]:not(:first-child),
.b3-typography [custom-iscornell="true"] > [data-type="NodeSuperBlock"]:first-child [data-type="NodeSuperBlock"]:not(:first-child) {
  flex: 1 1 auto;
  min-height: 110px;
  box-sizing: border-box;
  margin: 0 0 var(--cornell-gap) 0 !important;
  padding: var(--cornell-padding) !important;
  border-radius: 0 !important;
  border-left: 0 !important;
  background: var(--cornell-note-bg) !important;
  color: var(--cornell-text);
}
.protyle-wysiwyg [custom-iscornell="true"] > [data-type="NodeSuperBlock"]:not(:first-child),
.b3-typography [custom-iscornell="true"] > [data-type="NodeSuperBlock"]:not(:first-child) {
  min-height: 110px;
  box-sizing: border-box;
  margin: 0 !important;
  padding: var(--cornell-padding) !important;
  border-radius: 0 !important;
  background: var(--cornell-summary-bg) !important;
  color: var(--cornell-text);
}
.protyle-wysiwyg [custom-iscornell="true"] > [data-type="NodeSuperBlock"]:first-child [data-type="NodeSuperBlock"]:first-child > [data-node-id]:first-child,
.b3-typography [custom-iscornell="true"] > [data-type="NodeSuperBlock"]:first-child [data-type="NodeSuperBlock"]:first-child > [data-node-id]:first-child {
  color: var(--cornell-clue-title) !important;
  font-weight: 700;
}
.protyle-wysiwyg [custom-iscornell="true"] > [data-type="NodeSuperBlock"]:first-child [data-type="NodeSuperBlock"]:not(:first-child) > [data-node-id]:first-child,
.b3-typography [custom-iscornell="true"] > [data-type="NodeSuperBlock"]:first-child [data-type="NodeSuperBlock"]:not(:first-child) > [data-node-id]:first-child {
  color: var(--cornell-note-title) !important;
  font-weight: 700;
}
.protyle-wysiwyg [custom-iscornell="true"] > [data-type="NodeSuperBlock"]:not(:first-child) > [data-node-id]:first-child,
.b3-typography [custom-iscornell="true"] > [data-type="NodeSuperBlock"]:not(:first-child) > [data-node-id]:first-child {
  color: var(--cornell-summary-title) !important;
  font-weight: 700;
}
</style>
